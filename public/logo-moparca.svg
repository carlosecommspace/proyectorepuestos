<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 180" fill="none">
  <!-- Gear/cog shape -->
  <g transform="translate(90, 90)">
    <!-- Outer gear teeth -->
    <path d="M0,-80 L8,-78 L12,-68 L18,-70 L26,-60 L20,-54 L26,-46 L32,-48 L42,-36 L34,-30 L38,-22 L46,-22 L52,-8 L44,-4 L46,6 L54,8 L54,22 L46,22 L46,32 L52,36 L46,50 L40,44 L34,52 L38,58 L26,66 L22,58 L14,62 L14,70 L0,72 L-2,64 L-10,64 L-14,72 L-26,66 L-22,58 L-30,52 L-36,56 L-46,44 L-38,38 L-42,28 L-50,28 L-54,14 L-46,10 L-46,0 L-54,-6 L-48,-20 L-40,-18 L-36,-28 L-42,-34 L-32,-46 L-26,-40 L-18,-48 L-22,-56 L-10,-64 L-6,-56 L0,-58 Z" fill="#1a3a8f"/>
    <!-- Inner circle (white cutout) -->
    <circle cx="0" cy="0" r="48" fill="white"/>
    <!-- Curved swoosh inside gear -->
    <path d="M-36,20 Q-30,-20 0,-36 Q20,-44 40,-20" stroke="#1a3a8f" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Yellow accent swoosh -->
    <path d="M-28,16 Q-20,-8 -4,-20" stroke="#d4a017" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- M letter overlapping gear -->
  <g transform="translate(52, 20)">
    <path d="M30,0 L30,140 L50,140 L50,50 L76,100 L80,100 L106,50 L106,140 L126,140 L126,0 L106,0 L78,60 L50,0 Z" fill="#1a3a8f"/>
    <!-- Yellow triangle accent at base of M -->
    <path d="M76,110 L82,110 L79,120 Z" fill="#d4a017"/>
  </g>
  <!-- MOPARCA text -->
  <text x="200" y="120" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="#1a3a8f" letter-spacing="4">MOPARCA</text>
</svg>